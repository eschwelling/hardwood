services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      APP_NAME: Hardwood
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: hardwood
      DB_USERNAME: hardwood
      DB_PASSWORD: hardwood
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hardwood
      POSTGRES_USER: hardwood
      POSTGRES_PASSWORD: hardwood
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
