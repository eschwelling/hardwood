services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    env_file: .env

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hardwood
      POSTGRES_USER: hardwood
      POSTGRES_PASSWORD: hardwood
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
